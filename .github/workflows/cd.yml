name: CD — Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Datghb/Parasitic-.git || true
            fi

            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main

            # Create default env files if they do not exist to prevent docker compose failure
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi
            if [ ! -f frontend/.env ]; then
              cp frontend/.env.example frontend/.env
            fi

            # Clean and parse NEXT_PUBLIC_API_URL (removes carriage returns, double/single quotes)
            if [ -f frontend/.env ]; then
              RAW_API_URL=$(grep -m1 '^NEXT_PUBLIC_API_URL=' frontend/.env | cut -d= -f2- | tr -d '\r"' | tr -d "'")
              # Avoid using localhost in production; fallback to production URL if dev URL detected
              if [[ "$RAW_API_URL" == *"localhost"* || -z "$RAW_API_URL" ]]; then
                export NEXT_PUBLIC_API_URL=https://api.theoria-lab.io.vn
              else
                export NEXT_PUBLIC_API_URL="$RAW_API_URL"
              fi
            else
              export NEXT_PUBLIC_API_URL=https://api.theoria-lab.io.vn
            fi

            # Auto-generate ADMIN_API_KEY if not set
            if ! grep -q '^ADMIN_API_KEY=' backend/.env || grep -q '^ADMIN_API_KEY=$' backend/.env; then
              NEW_KEY=$(openssl rand -hex 24)
              # Remove empty or missing key line, then append
              sed -i '/^ADMIN_API_KEY=$/d' backend/.env
              echo "ADMIN_API_KEY=$NEW_KEY" >> backend/.env
              echo "Generated new ADMIN_API_KEY"
            else
              echo "ADMIN_API_KEY already set"
            fi

            # Zero-downtime deployment: build first, then restart
            docker compose -f deploy/compose.yaml build
            docker compose -f deploy/compose.yaml up -d
            docker image prune -f
            docker compose -f deploy/compose.yaml ps
