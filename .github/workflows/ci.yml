name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt && pip install -e ".[dev]" --no-deps

      - name: Lint backend (ruff check)
        run: ruff check backend --config backend/ruff.toml

      - name: Format check backend (ruff format)
        run: ruff format --check backend --config backend/ruff.toml

      - name: Run backend tests
        run: pytest backend/tests -v

      - name: Run business evaluation gate (smoke test)
        run: python backend/eval/smoke.py

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit backend

      - name: Scan repository for known vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.13.0
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run critical browser flow
        working-directory: frontend
        run: npm run test:e2e

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
